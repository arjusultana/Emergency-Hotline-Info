function renderHistory(){
  const list = document.getElementById("history-list");
  if(!list) return;

  let history = JSON.parse(localStorage.getItem("callHistory")) || [];

  // শুধু last 5টা দেখাবে
  history = history.slice(-5).reverse();

  if(history.length === 0){
    list.innerHTML = "<p class='text-gray-500'>No recent calls</p>";
    return;
  }

  list.innerHTML = history.map(item => `
    <li class="flex justify-between items-center bg-gray-100 p-2 rounded">
      <div>
        <p class="font-semibold">${item.name}</p>
        <p class="text-sm text-gray-500">${item.number}</p>
      </div>

      <button onclick="callNow('${item.number}')"
        class="bg-green-500 text-white px-2 py-1 rounded text-sm">
        Call
      </button>
    </li>
  `).join("");
}

renderHistory();
function callNow(num){

  let history = JSON.parse(localStorage.getItem("callHistory")) || [];

  history.push({
  id: Date.now(),
  name: document.getElementById("title").innerText,
  number: num,
  service: serviceKey, // 🔥 MUST ADD
  date: new Date().toLocaleDateString(),
  time: new Date().toLocaleTimeString()
});

  localStorage.setItem("callHistory", JSON.stringify(history));

  renderHistory(); // 🔥 instant update

  window.location.href = "tel:" + num;
}

const params = new URLSearchParams(window.location.search);
const serviceKey = params.get("service");
renderServiceHistory(serviceKey);
const districtSelect = document.getElementById("districtSelect");
const serviceContent = document.getElementById("service-content");

if (serviceKey && services[serviceKey]) {

  const s = services[serviceKey];

  document.getElementById("title").innerText = s.name;
  document.getElementById("service-img").src = s.img;

  if (s.districts) {

    districtSelect.classList.remove("hidden");
    serviceContent.innerHTML = `<p class="text-gray-600">${s.desc}</p>`;

    districtSelect.addEventListener("change", function () {
      const selected = this.value;

      if (!selected) {
        serviceContent.innerHTML = `<p class="text-gray-600">${s.desc}</p>`;
        return;
      }

      const stations = s.districts[selected];

      if (!stations || stations.length === 0) {
        serviceContent.innerHTML = `<p class="text-red-500 mt-3">এই জেলার তথ্য পাওয়া যায়নি।</p>`;
        return;
      }

      const stationsHTML = stations.map(st => `
        <div class="border border-gray-200 p-4 rounded-lg mt-3 fade-in flex justify-between items-center">
          <div>
            <p class="font-semibold text-gray-800">${st.name}</p>
            <p class="text-green-600 font-bold text-lg">📞 ${st.number}</p>
          </div>
          <button onclick="callNow('${st.number}')"
            class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition">
            Call Now
          </button>
        </div>
      `).join("");

      serviceContent.innerHTML = `
        <p class="text-gray-600 mb-2">${s.desc}</p>
        ${stationsHTML}
      `;
    });

  } else {

    districtSelect.classList.add("hidden");

    serviceContent.innerHTML = `
      <div class="fade-in text-center">
        <p class="text-3xl font-bold text-green-600 mt-2">📞 ${s.number}</p>
        <p class="mt-3 text-gray-600">${s.desc}</p>
        <button onclick="callNow('${s.number}')"
          class="mt-5 bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg text-lg transition">
          📲 Call Now
        </button>
      </div>
    `;
  }

} else {
  document.getElementById("title").innerText = "Service not found 😢";
  document.getElementById("detailsBox").innerHTML = `
    <p class="text-gray-500 text-center mt-4">অনুগ্রহ করে সঠিক service বেছে নিন।</p>
  `;
}

function callNow(num) {
  window.location.href = "tel:" + num;
}
function renderServiceHistory(serviceKey) {
    const history = JSON.parse(localStorage.getItem("callHistory")) || [];

    const filtered = history.filter(item => item.service === serviceKey);

    const container = document.getElementById("service-history");

    if (!container) return;

    if (filtered.length === 0) {
        container.innerHTML = "<p class='text-gray-400'>No calls yet</p>";
        return;
    }

    container.innerHTML = filtered.map(item => `
        <div class="border p-2 rounded mt-2 text-left">
            <p class="font-semibold">${item.name} - ${item.number}</p>
            <p class="text-xs text-gray-500">${item.date} | ${item.time}</p>
        </div>
    `).join("");
}
